# ===================== Application =====================
spring.application.name=notificationservice
server.port=8090

# ===================== DataSource =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/winderp_notification
spring.datasource.username=postgres
spring.datasource.password=wafawafa
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Eureka
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ===================== Swagger / OpenAPI =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===================== Security (optionnel pour tests Postman) =====================
# Pour permettre POST/GET sans authentification pendant le test
spring.security.user.name=admin
spring.security.user.password=admin